<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form>
      <h1>APPLICATION FORM</h1>
      <br />
      <p>
        Thankyou for your working with us. Please check below for avaliable job
        opportunities that meet you creteria and send your application by
        filling out the Job Application Form
      </p>
      <br />
      <label>*Full Name: </label>
      <input type="text" placeholder="Enter the name" /><br /><br />
      <label>*Email: </label>
      <input type="text" placeholder="Enter your email" /><br /><br />
      <label>*Age: </label>
      <input type="text" placeholder="Enter the Age" /><br /><br />
      <label>*Mobile no: </label>
      <input type="tel" minlength="10" maxlenght="10" /><br /><br />
      <label>Which option best describe your current role?</label>
      <select>
        <option>Student</option>
        <option>Fresher</option>
        <option>Intern</option>
        <option>Trainee</option></select
      ><br /><br />
      <lable>Would you like to list refernces?</lable><br />

      <input type="radio" id="y" name="allow" />
      <label for="y">Yes</label> <br />
      <input type="radio" id="n" name="allow" />
      <label for="n">No</label> <br />

      <label>Which position would you like to apply for?</label>
      <select>
        <option>Software Developer</option>
        <option>AI Intern</option>
        <option>System Engineer</option>
        <option>Web Developer</option></select
      ><br /><br />
      <label>Which programming language do you know?</label><br />
      <input type="checkbox" id="a" />
      <label for="a">Java</label><br />
      <input type="checkbox" id="b" />
      <label for="b">C++</label><br />
      <input type="checkbox" id="c" />
      <label for="c">.Net</label><br />
      <input type="checkbox" id="d" />
      <label for="d">Python</label><br />
      <input type="checkbox" id="e" />
      <label for="e">C#</label><br /><br />
      <label>Any Comments?</label><br />
      <textarea></textarea><br /><br />
      <button>Submit</button>
      <textarea></textarea><br />
    </form>
  </body>
</html>
