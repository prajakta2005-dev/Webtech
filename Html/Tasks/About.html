<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- Html entity -->
    <h1>Trip plans</h1>

    <fieldset style="width: 200px">
      <legend>Choose your vehicle</legend>
      <!-- radio -->
      <input type="radio" id="A" name="vehicle" />
      <label for="A">🏍️</label>
      <input type="radio" id="B" name="vehicle" />
      <label for="B">🚗</label>
      <input type="radio" id="C" name="vehicle" />
      <label for="C">🚌</label>
      <input type="radio" id="D" name="vehicle" />
      <label for="D">🚆</label>
    </fieldset>
    <br />
    <fieldset style="width: 650px">
      <legend>Select visiting places</legend>
      <!-- checkbox -->
      <input type="checkbox" id="P" />
      <img
        src="https://ik.imgkit.net/3vlqs5axxjf/external/ik-seo/http://images.ntmllc.com/v4/destination/Hong-Kong/Hong-Kong-city/112086_SCN_HongKong_iStock466733790_Z8C705/Hong-Kong-Scenery.jpg?tr=w-780%2Ch-437%2Cfo-auto"
        height="70px"
        width="80px"
      />
      <label for="P">Hongkong</label>

      <input type="checkbox" id="R" />
      <img
        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRQmAcz8FIsuWyuEWE-z1boZdeG0ky8zgf2BQ&s"
        height="70px"
        width="80px"
      />
      <label for="R">Paris</label>

      <input type="checkbox" id="J" />
      <img
        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcThFbEGA7I9U4seOLGy4cpMNfu6JtiC1JIqVA&s"
        height="70px"
        width="80px"
      />
      <label for="J">Dubai</label>

      <input type="checkbox" id="K" />
      <img
        src="https://www.flamingotravels.co.in/_next/image?url=https%3A%2F%2Fimgcdn.flamingotravels.co.in%2FImages%2FPlacesOfInterest%2Fgreat-wall-of-china.jpg&w=1080&q=90"
        height="70px"
        width="80px"
      />
      <label for="K">China</label>
    </fieldset>
    <fieldset>
      <legend>Hotel Description</legend>
      <dl>
        <dt>Dubai international Hotel</dt>
        <img
          src="https://images.trvl-media.com/lodging/5000000/4470000/4460600/4460585/ff5d9f80.jpg?impolicy=resizecrop&rw=575&rh=575&ra=fill"
          height="70px"
          width="80px"
        />
      </dl>
    </fieldset>
  </body>
</html>
